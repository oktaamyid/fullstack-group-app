<!DOCTYPE html>

<html class="light" lang="en"><head>

                    "error": "#ba1a1a",
                    "primary": "#4648d4",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .animate-pulse-soft {
            animation: pulse-soft 3s ease-in-out infinite;
        }
        .scholarly-shadow {
            box-shadow: 4px 4px 0px 0px #1c1c13;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#fdf9e9] font-body text-on-surface selection:bg-secondary-container selection:text-on-secondary-container overflow-hidden h-screen w-screen flex flex-col items-center justify-center">
<!-- Splash Content Wrapper -->
<main class="relative flex flex-col items-center justify-center max-w-sm w-full px-8 text-center">
<!-- Mascot Section -->
<div class="relative mb-12 animate-pulse-soft">
<!-- Decorative Academic Ring Background -->
<div class="absolute inset-0 -m-4 border-2 border-dashed border-outline opacity-20 rounded-full"></div>
<!-- Character Card -->
<div class="relative bg-white border border-on-surface rounded-full p-2 scholarly-shadow overflow-hidden w-64 h-64 flex items-center justify-center">
<img alt="LIVO Graduation Hamster Mascot" class="w-full h-full object-cover rounded-full" data-alt="A cute chubby hamster wearing a miniature graduation cap and tiny glasses, holding a gold coin, soft bright illustration style with warm lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA1l7wNePoZV6h-8C7ZMYfun_04iPMoRpNbba-vW2dhxIfNt14VRq2fhcZUzVmvnHesX5CsjW8jRy_MHsRXfGW1Gw4bF_zpd25ahNk9WVp4dUwZpySt1Snx2Zwt6Bgzj5p4bN9KmMGeFmhG-haEFOT3nD9ahNQd-uRCbUNumXJfy1zRi7nx_fkGCiNABsbQFM3asmAcLM-DfE4GzDh8mkW5yE6oTioEsP4H64FKinUxr2NrwAHONW0HbCeAWOlN8Z3quUd1l2L_meAp"/>
</div>
<!-- Floating Badge Element -->
<div class="absolute -top-2 -right-2 bg-secondary-container border border-on-surface px-4 py-1 rounded-full scholarly-shadow transform rotate-12">
<span class="text-[10px] font-extrabold uppercase tracking-widest text-on-secondary-container">Level up</span>
</div>
</div>
<!-- Typography Branding -->
<div class="space-y-4">
<h1 class="font-headline text-5xl font-extrabold tracking-tighter text-on-surface uppercase">
                LIVO
            </h1>
<div class="inline-block bg-primary border border-on-surface scholarly-shadow px-6 py-3 rounded-lg transform -rotate-1">
<p class="font-label text-xs uppercase tracking-[0.2em] text-white font-bold leading-tight">
                    Your Academic Coin Master
                </p>
</div>
</div>
<!-- Progress Indicator -->
<div class="mt-16 w-full max-w-[200px] flex flex-col items-center gap-4">
<!-- Neo-Brutalist Progress Bar -->
<div class="w-full h-4 bg-surface-container border border-on-surface rounded-full overflow-hidden relative">
<div class="absolute inset-y-0 left-0 bg-secondary-container border-r border-on-surface w-3/4"></div>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-lg animate-spin" style="font-variation-settings: 'FILL' 0;">
                    sync
                </span>
<p class="text-[10px] font-bold uppercase tracking-widest opacity-60">Syncing Achievements...</p>
</div>
</div>
</main>
<!-- Footer Attribution -->
<footer class="absolute bottom-10 flex flex-col items-center gap-2">
<p class="text-[10px] font-bold uppercase tracking-widest opacity-40">
            © 2024 Scholarly Rebel Labs
        </p>
</footer>
<!-- Content Suppression Guard: Navigation shells are hidden for splash screen as per protocol -->
<!-- (TopAppBar and BottomNavBar suppressed for focused journey) -->
