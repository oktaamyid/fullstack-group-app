<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>LIVO - Scholarly Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed": "#301400",
                        "tertiary-fixed-dim": "#ffb783",
                        "on-background": "#1c1c13",
                        "on-primary-fixed": "#07006c",
                        "on-error-container": "#93000a",
                        "surface-variant": "#e6e3d3",
                        "on-tertiary-fixed-variant": "#703700",
                        "surface": "#fdf9e9",
                        "error-container": "#ffdad6",
                        "secondary": "#795900",
                        "outline": "#767586",
                        "on-tertiary-container": "#fffbff",
                        "inverse-surface": "#323126",
                        "primary-container": "#6063ee",
                        "on-secondary-fixed": "#261a00",
                        "primary-fixed": "#e1e0ff",
                        "error": "#ba1a1a",
                        "primary": "#4648d4",
                        "on-surface-variant": "#464554",
                        "on-surface": "#1c1c13",
                        "background": "#fdf9e9",
                        "inverse-primary": "#c0c1ff",
                        "on-tertiary": "#ffffff",
                        "tertiary": "#904900",
                        "surface-container-high": "#ece8d9",
                        "on-error": "#ffffff",
                        "secondary-container": "#ffc329",
                        "surface-container-highest": "#e6e3d3",
                        "surface-container-low": "#f8f4e4",
                        "on-secondary": "#ffffff",
                        "tertiary-container": "#b55d00",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#f5f1e1",
                        "on-secondary-container": "#6f5100",
                        "surface-container": "#f2eede",
                        "secondary-fixed-dim": "#f9bd22",
                        "on-primary-container": "#fffbff",
                        "surface-dim": "#dedacb",
                        "primary-fixed-dim": "#c0c1ff",
                        "on-secondary-fixed-variant": "#5c4300",
                        "secondary-fixed": "#ffdf9f",
                        "surface-tint": "#494bd6",
                        "tertiary-fixed": "#ffdcc5",
                        "on-primary-fixed-variant": "#2f2ebe",
                        "secondary-fixed": "#ffdf9f",
                        "on-primary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Plus Jakarta Sans"],
                        "label": ["Plus Jakarta Sans"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdf9e9;
        }
    </style>
    <style>
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>

<body class="bg-background text-on-background min-h-screen flex flex-col items-center justify-center p-6">
    <!-- Top Navigation Suppression: Not rendered for Transactional Login flow -->
    <!-- Main Content Canvas -->
    <main class="w-full max-w-sm flex flex-col items-center">
        <!-- Hamster Mascot Section -->
        <div class="mb-8 relative">
            <div
                class="w-32 h-32 rounded-full border-2 border-on-surface bg-secondary-container flex items-center justify-center overflow-hidden shadow-[4px_4px_0px_0px_#1c1c13]">
                <img alt="Cute graduation hamster mascot" class="w-full h-full object-cover"
                    data-alt="A cute fluffy hamster wearing a tiny black academic graduation cap, bright eyes, sitting on a warm cream background with soft lighting"
                    src="https://lh3.googleusercontent.com/aida-public/AB6AXuBC-0n2iDMnaJEyEqn-9P3cDhL-n-FhL1gw3J9zwSooznWfsKSgQ5oP-D68amw5GcxnQ3rT3mSx5-4gmSL18DYHxaI2csVoOpqzWLlkecdm57Hs8NSPNrmX270rAPs_YMTr7iiShAjYJ_M4DJVaMd9Vc_-ngUoL9bH1j0TOTrZDKi9YL56H1ypL2ak3nbZ2TPWRKWx93VYTWe-8nv9VYX9-_9gtGj2N_f3spjZAPEyYM1UqKj0NyQwR2I1DvfKnzoj-4Jz1lBqQpUTp" />
            </div>
        </div>
        <!-- Welcome Messaging -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-extrabold tracking-tight text-on-surface mb-2" style="letter-spacing: -0.02em;">
                LIVO</h1>
            <p class="text-on-surface-variant font-medium">Welcome back, Scholar.</p>
        </div>
        <!-- Login Form Container -->
        <section class="w-full space-y-4">
            <!-- Google Button (Large Target) -->
            <button
                class="w-full h-14 bg-surface-container-lowest border border-on-surface rounded-lg flex items-center justify-center gap-3 shadow-[4px_4px_0px_0px_#1c1c13] hover:bg-secondary-container transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none group">
                <svg class="w-6 h-6" viewbox="0 0 24 24">
                    <path
                        d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                        fill="#4285F4"></path>
                    <path
                        d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                        fill="#34A853"></path>
                    <path
                        d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                        fill="#FBBC05"></path>
                    <path
                        d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                        fill="#EA4335"></path>
                </svg>
                <span class="text-sm font-bold tracking-wider uppercase">Continue with Google</span>
            </button>
            <!-- Divider -->
            <div class="flex items-center gap-4 py-2">
                <div class="h-[1px] flex-grow bg-on-surface opacity-20"></div>
                <span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">or email</span>
                <div class="h-[1px] flex-grow bg-on-surface opacity-20"></div>
            </div>
            <!-- Standard Inputs -->
            <div class="space-y-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface ml-1">Email
                        Address</label>
                    <div class="relative">
                        <input
                            class="w-full h-12 px-4 bg-surface-container-lowest border border-on-surface rounded-lg text-sm focus:ring-0 focus:outline-none focus:bg-primary-fixed focus:shadow-[4px_4px_0px_0px_#1c1c13] transition-all placeholder:text-on-surface-variant/40"
                            placeholder="scholar@livo.edu" type="email" />
                    </div>
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-[10px] font-bold uppercase tracking-widest text-on-surface ml-1">Password</label>
                    <div class="relative">
                        <input
                            class="w-full h-12 px-4 bg-surface-container-lowest border border-on-surface rounded-lg text-sm focus:ring-0 focus:outline-none focus:bg-primary-fixed focus:shadow-[4px_4px_0px_0px_#1c1c13] transition-all placeholder:text-on-surface-variant/40"
                            placeholder="••••••••" type="password" />
                    </div>
                </div>
            </div>
            <!-- Primary Action -->
            <button
                class="w-full h-14 bg-primary text-on-primary border border-on-surface rounded-lg font-bold tracking-widest uppercase text-sm shadow-[4px_4px_0px_0px_#1c1c13] transition-all active:translate-x-[2px] active:translate-y-[2px] active:shadow-none mt-4">
                Enter Library
            </button>
            <!-- Secondary Links -->
            <div class="flex justify-between items-center px-1 pt-2">
                <button
                    class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors">
                    Forgot Key?
                </button>
                <button
                    class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant hover:text-primary transition-colors">
                    Create Account
                </button>
            </div>
        </section>
        <!-- Footer Note -->
        <footer class="mt-12 text-center">
            <p class="text-[10px] font-bold text-on-surface-variant/60 uppercase tracking-[0.2em]">Academic Integrity
                First</p>
        </footer>
    </main>
    <!-- Navigation Shell Suppression: Login screen is task-focused (Rule: Shell Visibility & Relevance) -->
</body>

</html>
